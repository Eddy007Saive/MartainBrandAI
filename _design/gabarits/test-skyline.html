<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;display:flex;gap:24px;padding:40px;font-family:Inter,sans-serif;flex-wrap:wrap;justify-content:center}
  .lbl{width:100%;text-align:center;color:#8a8fa6;font-size:13px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
  .frame{position:relative;width:600px;height:600px;border-radius:16px;overflow:hidden;color:#fff;padding:48px;display:flex;flex-direction:column}
  .photo{position:absolute;inset:0;background-size:cover;background-position:center}
  .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,5,12,.35),rgba(5,5,12,.2) 40%,rgba(5,5,12,.93))}
  .top{display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
  .label{background:rgba(124,92,255,.25);border:1px solid rgba(124,92,255,.45);color:#e6e0ff;font-size:11px;font-weight:700;padding:5px 11px;border-radius:999px;backdrop-filter:blur(4px)}
  .logo{display:flex;align-items:center;gap:9px}
  .logo .g{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-family:Sora;font-weight:800;font-size:17px;background:radial-gradient(circle at 35% 30%,#b9a6ff,#7c5cff 60%);box-shadow:0 0 22px rgba(124,92,255,.8)}
  .logo b{font-family:Sora;font-weight:800;font-size:15px;text-shadow:0 2px 10px rgba(0,0,0,.6)}
  .spacer{flex:1}
  .quote{font-family:Sora;font-weight:700;font-size:30px;line-height:1.25;position:relative;z-index:2;text-shadow:0 3px 20px rgba(0,0,0,.6)}
  .quote .v{color:#b9a6ff}
  .who{display:flex;align-items:center;gap:12px;position:relative;z-index:2;margin-top:22px}
  .who img{width:46px;height:46px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.25)}
  .who .nm{font-weight:700;font-size:15px}.who .rl{color:#c3c8db;font-size:12.5px}
</style></head><body>
<div class="lbl">Image générée par Nano Banana (scène cinématique) + texte de marque</div>

<!-- L'image IA seule -->
<div class="frame"><div class="photo" style="background-image:url('ai/bg_skyline.png')"></div></div>

<!-- Le gabarit final : image IA + frame/texte -->
<div class="frame">
  <div class="photo" style="background-image:url('ai/bg_skyline.png')"></div><div class="ov"></div>
  <div class="top"><span class="label">Témoignage</span><span class="logo"><span class="g">G</span><b>GoodTime</b></span></div>
  <div class="spacer"></div>
  <div class="quote">« Libère-toi de<br>l'opérationnel.<br><span class="v">Construis l'essentiel. »</span></div>
  <div class="who">
    <img src="https://res.cloudinary.com/dy9gp5pim/image/upload/v1782462179/blackcore/founder.jpg" alt="">
    <div><div class="nm">Martin Kraemer</div><div class="rl">Fondateur de GoodTime</div></div>
  </div>
</div>
</body></html>
